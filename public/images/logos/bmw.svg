<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="currentColor">
  <!-- BMW Roundel -->
  <!-- Outer ring -->
  <circle cx="100" cy="100" r="90" fill="none" stroke="currentColor" stroke-width="8" opacity="0.95"/>
  <!-- Inner ring -->
  <circle cx="100" cy="100" r="72" fill="none" stroke="currentColor" stroke-width="2" opacity="0.7"/>
  <!-- Quadrant dividers -->
  <line x1="100" y1="28" x2="100" y2="172" stroke="currentColor" stroke-width="5" opacity="0.8"/>
  <line x1="28" y1="100" x2="172" y2="100" stroke="currentColor" stroke-width="5" opacity="0.8"/>
  <!-- Filled quadrants (top-right and bottom-left = blue simulation with opacity) -->
  <path d="M100,28 A72,72 0 0,1 172,100 L100,100 Z" opacity="0.85"/>
  <path d="M100,172 A72,72 0 0,1 28,100 L100,100 Z" opacity="0.85"/>
  <!-- BMW text -->
  <text x="100" y="107" font-family="sans-serif" font-size="20" font-weight="900" text-anchor="middle" letter-spacing="2" fill="currentColor" opacity="0.95">BMW</text>
  <!-- Outer border ring bold -->
  <circle cx="100" cy="100" r="90" fill="none" stroke="currentColor" stroke-width="10" opacity="0.95"/>
</svg>