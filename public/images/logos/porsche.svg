<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="currentColor">
  <!-- Porsche Crest -->
  <!-- Outer crest shield -->
  <path d="M100,15 L175,50 L175,130 Q175,170 100,190 Q25,170 25,130 L25,50 Z" fill="none" stroke="currentColor" stroke-width="6" opacity="0.95"/>
  <!-- Center Stuttgart horse rearing up -->
  <g transform="translate(100,102)">
    <!-- Horse body -->
    <path d="M0,-35 C-8,-35 -14,-28 -16,-20 C-18,-12 -15,-4 -10,2 C-7,6 -6,10 -5,14 C-4,20 -4,28 -2,34 C-1,38 2,38 3,34 C5,28 5,20 6,14 C7,10 8,6 11,2 C16,-4 19,-12 17,-20 C15,-28 9,-35 0,-35 Z" opacity="0.95"/>
    <!-- Head -->
    <path d="M0,-35 C-4,-42 -10,-44 -13,-40 C-16,-36 -14,-28 -8,-26 C-5,-25 -2,-26 0,-28 C2,-26 5,-25 8,-26 C14,-28 16,-36 13,-40 C10,-44 4,-42 0,-35 Z" opacity="0.95"/>
    <!-- Raised front leg -->
    <path d="M-9,10 C-14,16 -18,24 -16,32 C-14,38 -8,40 -4,36 C0,32 0,22 -2,14 Z" opacity="0.95"/>
    <!-- Standing legs -->
    <rect x="-4" y="30" width="6" height="16" rx="3" opacity="0.9"/>
    <rect x="4" y="30" width="6" height="16" rx="3" opacity="0.9"/>
    <!-- Tail -->
    <path d="M10,5 C16,0 20,6 18,12 C16,16 12,16 10,12" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" opacity="0.85"/>
  </g>
  <!-- Antlers / decorative left quadrant lines -->
  <line x1="40" y1="60" x2="95" y2="60" stroke="currentColor" stroke-width="2" opacity="0.5"/>
  <line x1="40" y1="75" x2="95" y2="75" stroke="currentColor" stroke-width="2" opacity="0.5"/>
  <line x1="40" y1="90" x2="95" y2="90" stroke="currentColor" stroke-width="2" opacity="0.5"/>
  <!-- Decorative right quadrant lines -->
  <line x1="105" y1="60" x2="160" y2="60" stroke="currentColor" stroke-width="2" opacity="0.5"/>
  <line x1="105" y1="75" x2="160" y2="75" stroke="currentColor" stroke-width="2" opacity="0.5"/>
  <line x1="105" y1="90" x2="160" y2="90" stroke="currentColor" stroke-width="2" opacity="0.5"/>
  <!-- PORSCHE lettering area -->
  <text x="100" y="178" font-family="serif" font-size="14" font-weight="900" text-anchor="middle" letter-spacing="6" opacity="0.9">PORSCHE</text>
  <!-- Center dividers -->
  <line x1="100" y1="50" x2="100" y2="155" stroke="currentColor" stroke-width="3" opacity="0.6"/>
  <line x1="40" y1="102" x2="160" y2="102" stroke="currentColor" stroke-width="3" opacity="0.6"/>
</svg>