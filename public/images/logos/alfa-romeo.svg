<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="currentColor">
  <!-- Alfa Romeo Cross and Serpent Shield -->
  <!-- Outer circle ring -->
  <circle cx="100" cy="100" r="88" fill="none" stroke="currentColor" stroke-width="5" opacity="0.95"/>
  <circle cx="100" cy="100" r="78" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.4"/>
  <!-- Vertical divider -->
  <line x1="100" y1="22" x2="100" y2="178" stroke="currentColor" stroke-width="4" opacity="0.8"/>
  <!-- Left cross (Milanese cross) -->
  <g transform="translate(52,55)">
    <rect x="18" y="0" width="12" height="90" rx="3" opacity="0.9"/>
    <rect x="0" y="18" width="48" height="12" rx="3" opacity="0.9"/>
    <!-- Cross tips fleur style -->
    <circle cx="24" cy="0" r="6" opacity="0.8"/>
    <circle cx="24" cy="90" r="6" opacity="0.8"/>
    <circle cx="0" cy="24" r="6" opacity="0.8"/>
    <circle cx="48" cy="24" r="6" opacity="0.8"/>
  </g>
  <!-- Right serpent (Biscione) - stylized snake with figure -->
  <g transform="translate(108,52)">
    <!-- Snake body wave -->
    <path d="M20,0 C30,20 10,40 20,60 C30,80 10,100 20,120" fill="none" stroke="currentColor" stroke-width="8" stroke-linecap="round" opacity="0.9"/>
    <!-- Snake head -->
    <ellipse cx="24" cy="0" rx="10" ry="8" opacity="0.9"/>
    <!-- Snake tongue -->
    <path d="M24,-8 L20,-18 M24,-8 L28,-18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
    <!-- Human figure inside snake (simplified) -->
    <circle cx="20" cy="65" r="8" fill="black" opacity="0.6"/>
  </g>
  <!-- ALFA ROMEO text on arc (top) -->
  <text x="100" y="190" font-family="serif" font-size="11" font-weight="900" text-anchor="middle" letter-spacing="5" opacity="0.8">ALFA ROMEO</text>
</svg>