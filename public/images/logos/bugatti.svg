<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="currentColor">
  <!-- Bugatti EB Oval Logo - square viewBox -->
  <!-- Outer oval -->
  <ellipse cx="100" cy="100" rx="92" ry="68" fill="none" stroke="currentColor" stroke-width="6" opacity="0.95"/>
  <!-- Inner oval -->
  <ellipse cx="100" cy="100" rx="78" ry="54" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.5"/>
  <!-- BUGATTI text -->
  <text x="100" y="97" font-family="serif" font-size="22" font-weight="900" text-anchor="middle" letter-spacing="8" opacity="0.95">BUGATTI</text>
  <!-- Automobiles subtext -->
  <text x="100" y="118" font-family="sans-serif" font-size="10" font-weight="400" text-anchor="middle" letter-spacing="6" opacity="0.65">AUTOMOBILES</text>
  <!-- Decorative corner dots -->
  <circle cx="10" cy="100" r="4" opacity="0.7"/>
  <circle cx="190" cy="100" r="4" opacity="0.7"/>
  <circle cx="100" cy="34" r="4" opacity="0.7"/>
  <circle cx="100" cy="166" r="4" opacity="0.7"/>
</svg>