<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="currentColor">
  <!-- Toyota three overlapping ellipses logo -->
  <!-- Large outer ellipse -->
  <ellipse cx="100" cy="100" rx="90" ry="62" fill="none" stroke="currentColor" stroke-width="6" opacity="0.95"/>
  <!-- Vertical center ellipse -->
  <ellipse cx="100" cy="100" rx="44" ry="62" fill="none" stroke="currentColor" stroke-width="6" opacity="0.95"/>
  <!-- Horizontal inner ellipse -->
  <ellipse cx="100" cy="100" rx="66" ry="28" fill="none" stroke="currentColor" stroke-width="6" opacity="0.95"/>
  <!-- TOYOTA text -->
  <text x="100" y="188" font-family="sans-serif" font-size="12" font-weight="900" text-anchor="middle" letter-spacing="5" opacity="0.8">TOYOTA</text>
</svg>