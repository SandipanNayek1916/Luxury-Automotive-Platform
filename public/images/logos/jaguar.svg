<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="currentColor">
  <!-- Jaguar Leaping Cat Logo -->
  <g transform="translate(100,100)">
    <!-- Leaping jaguar body -->
    <path d="M-50,-10 C-40,-30 -20,-45 0,-50 C20,-55 40,-50 55,-35 C65,-22 68,-5 60,10 C52,25 38,32 20,30 C10,28 2,22 -5,20 Z" opacity="0.95"/>
    <!-- Head -->
    <path d="M55,-35 C65,-45 75,-42 78,-32 C80,-22 74,-12 64,-10 C58,-8 52,-12 48,-20 Z" opacity="0.95"/>
    <!-- Ear -->
    <path d="M74,-40 C78,-50 84,-48 82,-38" stroke="currentColor" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.85"/>
    <!-- Front legs reaching forward -->
    <path d="M-5,20 C-12,35 -10,50 0,58 C8,64 16,60 20,52 C24,44 22,36 16,28" opacity="0.95"/>
    <path d="M20,30 C26,44 24,58 32,64 C40,70 48,64 50,54 C52,44 44,36 36,30" opacity="0.9"/>
    <!-- Back legs -->
    <path d="M-50,-10 C-60,2 -62,18 -54,28 C-46,36 -34,34 -28,24 C-22,14 -26,2 -36,-4 Z" opacity="0.9"/>
    <!-- Tail curving up -->
    <path d="M-50,-10 C-65,-20 -75,-10 -72,2 C-68,14 -55,18 -44,14" fill="none" stroke="currentColor" stroke-width="5" stroke-linecap="round" opacity="0.9"/>
    <!-- Spots -->
    <circle cx="0" cy="-20" r="3" fill="black" opacity="0.4"/>
    <circle cx="20" cy="-30" r="2.5" fill="black" opacity="0.4"/>
    <circle cx="-20" cy="-5" r="2.5" fill="black" opacity="0.4"/>
  </g>
  <!-- JAGUAR text -->
  <text x="100" y="190" font-family="serif" font-size="13" font-weight="900" text-anchor="middle" letter-spacing="6" opacity="0.8">JAGUAR</text>
</svg>