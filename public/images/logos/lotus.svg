<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="currentColor">
  <!-- Lotus Circle Emblem -->
  <!-- Outer ring -->
  <circle cx="100" cy="100" r="88" fill="none" stroke="currentColor" stroke-width="5" opacity="0.95"/>
  <!-- Inner ring -->
  <circle cx="100" cy="100" r="72" fill="none" stroke="currentColor" stroke-width="2" opacity="0.5"/>
  <!-- ACBC lettering (Anthony Colin Bruce Chapman) - or Lotus text -->
  <!-- Stylized Lotus L -->
  <path d="M60,50 L60,150 L145,150 L145,130 L80,130 L80,50 Z" opacity="0.9"/>
  <!-- LOTUS text -->
  <text x="100" y="188" font-family="serif" font-size="12" font-weight="900" text-anchor="middle" letter-spacing="8" opacity="0.8">LOTUS</text>
</svg>