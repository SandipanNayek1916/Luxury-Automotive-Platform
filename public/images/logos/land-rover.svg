<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="currentColor">
  <!-- Land Rover logo - circle with land rover text -->
  <circle cx="100" cy="100" r="88" fill="none" stroke="currentColor" stroke-width="5" opacity="0.9"/>
  <circle cx="100" cy="100" r="75" fill="none" stroke="currentColor" stroke-width="2" opacity="0.4"/>
  <text x="100" y="95" font-family="sans-serif" font-size="14" font-weight="900" text-anchor="middle" letter-spacing="3" opacity="0.9">LAND</text>
  <text x="100" y="118" font-family="sans-serif" font-size="14" font-weight="900" text-anchor="middle" letter-spacing="3" opacity="0.9">ROVER</text>
  <!-- Decorative oval element -->
  <ellipse cx="100" cy="106" rx="55" ry="30" fill="none" stroke="currentColor" stroke-width="3" opacity="0.5"/>
</svg>