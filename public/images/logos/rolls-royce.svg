<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="currentColor">
  <!-- Rolls-Royce RR Double-R Monogram - square viewBox -->
  <!-- Outer decorative frame -->
  <rect x="12" y="30" width="176" height="140" rx="8" fill="none" stroke="currentColor" stroke-width="3" opacity="0.65"/>
  <rect x="18" y="36" width="164" height="128" rx="6" fill="none" stroke="currentColor" stroke-width="1" opacity="0.35"/>
  <!-- Left R letterform -->
  <g transform="translate(28,44)">
    <rect x="0" y="0" width="10" height="112" rx="3" opacity="0.95"/>
    <path d="M10,0 L10,56 Q62,56 62,28 Q62,0 10,0 Z" opacity="0.95"/>
    <path d="M18,10 L18,46 Q48,46 48,28 Q48,10 18,10 Z" fill="black" opacity="0.6"/>
    <path d="M10,56 L62,112" stroke="currentColor" stroke-width="12" stroke-linecap="round" fill="none" opacity="0.95"/>
  </g>
  <!-- Divider line -->
  <line x1="100" y1="40" x2="100" y2="160" stroke="currentColor" stroke-width="2" opacity="0.4"/>
  <!-- Right R letterform -->
  <g transform="translate(106,44)">
    <rect x="0" y="0" width="10" height="112" rx="3" opacity="0.95"/>
    <path d="M10,0 L10,56 Q62,56 62,28 Q62,0 10,0 Z" opacity="0.95"/>
    <path d="M18,10 L18,46 Q48,46 48,28 Q48,10 18,10 Z" fill="black" opacity="0.6"/>
    <path d="M10,56 L62,112" stroke="currentColor" stroke-width="12" stroke-linecap="round" fill="none" opacity="0.95"/>
  </g>
</svg>