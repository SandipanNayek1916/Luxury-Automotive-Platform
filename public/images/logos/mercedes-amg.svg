<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="currentColor">
  <!-- Mercedes-Benz Three-Pointed Star -->
  <!-- Outer circle -->
  <circle cx="100" cy="100" r="88" fill="none" stroke="currentColor" stroke-width="5" opacity="0.95"/>
  <!-- Inner circle -->
  <circle cx="100" cy="100" r="78" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.5"/>
  <!-- Three-pointed star -->
  <!-- Top point -->
  <path d="M100,22 L110,95 L90,95 Z" opacity="0.95"/>
  <!-- Bottom-right point -->
  <path d="M100,22 L110,95 L90,95 Z" transform="rotate(120,100,100)" opacity="0.95"/>
  <!-- Bottom-left point -->
  <path d="M100,22 L110,95 L90,95 Z" transform="rotate(240,100,100)" opacity="0.95"/>
  <!-- Center circle -->
  <circle cx="100" cy="100" r="12" opacity="0.9"/>
  <!-- Decorative dot cluster where star meets ring -->
  <circle cx="100" cy="24" r="4" opacity="0.9"/>
  <circle cx="100" cy="24" r="4" transform="rotate(120,100,100)" opacity="0.9"/>
  <circle cx="100" cy="24" r="4" transform="rotate(240,100,100)" opacity="0.9"/>
</svg>