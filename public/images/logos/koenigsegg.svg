<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="currentColor">
  <!-- Koenigsegg Shield/Crest -->
  <!-- Shield outline -->
  <path d="M100,10 L180,45 L180,120 Q180,170 100,195 Q20,170 20,120 L20,45 Z" fill="none" stroke="currentColor" stroke-width="6" opacity="0.95"/>
  <!-- Inner shield -->
  <path d="M100,22 L168,52 L168,118 Q168,160 100,182 Q32,160 32,118 L32,52 Z" fill="none" stroke="currentColor" stroke-width="2" opacity="0.5"/>
  <!-- Ghost / K pattern in center -->
  <!-- K letterform -->
  <g transform="translate(75,55)">
    <rect x="0" y="0" width="10" height="90" rx="3" opacity="0.9"/>
    <path d="M10,45 L50,0" stroke="currentColor" stroke-width="10" stroke-linecap="round" fill="none" opacity="0.9"/>
    <path d="M10,45 L50,90" stroke="currentColor" stroke-width="10" stroke-linecap="round" fill="none" opacity="0.9"/>
  </g>
  <!-- Crown at top of shield -->
  <path d="M75,36 L85,28 L100,38 L115,28 L125,36 L120,52 L80,52 Z" opacity="0.85"/>
</svg>